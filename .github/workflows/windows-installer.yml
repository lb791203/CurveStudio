name: Windows Installer

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows-installers:
    name: Build and verify Windows installers
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ctv-macos-mvp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show tool versions
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version

      - name: Install npm dependencies
        run: npm install

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ctv-macos-mvp/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ctv-macos-mvp/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Release audit
        run: npm run audit:release

      - name: Run tests
        run: npm test

      - name: Validate import fixtures
        run: npm run validate:fixtures

      - name: Build frontend dist
        run: npm run build:dist

      - name: Build Windows installers
        run: npm run tauri:build:windows

      - name: Verify installer artifacts
        run: npm run verify:windows-artifacts

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: CurveStudio-windows-installers
          path: |
            ctv-macos-mvp/src-tauri/target/release/bundle/nsis/*.exe
            ctv-macos-mvp/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
